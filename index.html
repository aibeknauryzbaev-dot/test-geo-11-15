            { q: "Шу мен Сарысу өзендерінің төменгі ағысында жатқан құмды жазық?", a: "Мойынқұм", w: ["Қызылқұм", "Арал маңы Қарақұмы", "Үлкен Борсық"] },
            { q: "Төрткіл атырабы деген атауға ие үстірт?", a: "Торғай үстірті", w: ["Бетпақдала", "Үстірт", "Жалпы Сырт"] },
            { q: "Қаратау жотасының ең биік нүктесі?", a: "Бесшоқы (556м)", w: ["Ақсораң (1565м)", "Үлкен Боқтыбай (657м)", "Жамбыл (974м)"] },
            { q: "Үстірттің кей жерлерінде биіктігі 300 м-ден асатын жарқабақты кемер?", a: "Шың", w: ["Ойыс", "Аңғар", "Шатқал"] },
            { q: "Үстірт үстіртінің кей жерлерінде шыңдардың шығу себебі?", a: "Теңіз абразиясының нәтижесінде", w: ["Вулкандық атқылаудан", "Жер сілкінісінен", "Желдің үгілуінен"] },
            { q: "Қазақстанның ең аз зерттелген ауданы?", a: "Бетпақдала", w: ["Үстірт", "Торғай", "Маңғыстау"] },
            { q: "1936 жылы зоолог В.А. Селевин экспедиция ұйымдастырған аймақ?", a: "Бетпақдала", w: ["Қызылқұм", "Тұран жазығы", "Сарыарқа"] },
            { q: "Тұран жазығының негізгі бөлігі қашан қалыптасқан?", a: "Палеозойда", w: ["Мезозойда", "Кайнозойда", "Архейде"] },
            { q: "Тұран жазығының негізгі климаты?", a: "Құрғақ континентті", w: ["Теңіздік", "Ылғалды субтропиктік", "Муссонды"] },
            { q: "Жауын-шашын мөлшері 80-100 мм болатын жазық?", a: "Тұран жазығы", w: ["Солтүстік Қазақ жазығы", "Шығыс Еуропа жазығы", "Батыс Сібір жазығы"] },
            { q: "Тұран жазығының басым табиғат зонасы?", a: "Шөл зонасы", w: ["Орманды дала", "Тайга", "Дала зонасы"] },
            { q: "Орталық Қазақстанның көпшілік жерін алып жатқан жазық?", a: "Сарыарқа", w: ["Тұран жазығы", "Торғай үстірті", "Бетпақдала"] },
            { q: "Қазақстанның ұсақ шоқысы деп аталатын нысан?", a: "Сарыарқа", w: ["Мұғалжар", "Қаратау", "Маңғыстау таулары"] },
            { q: "Орографиялық ерекшеліктеріне сәйкес Сарыарқа қалай бөлінеді?", a: "Батыс және Шығыс", w: ["Солтүстік және Оңтүстік", "Биік және Аласа", "Ескі және Жаңа"] },
            { q: "Сарыарқаның ең биік жері?", a: "Қызыларай (Ақсораң, 1565м)", w: ["Ұлытау", "Көкшетау", "Жамбыл тауы"] },
            { q: "Сарыарқаның климаты қандай?", a: "Құрғақ континентті", w: ["Шұғыл континентті", "Теңіздік", "Ылғалды"] },
            { q: "Сарыарқадан ағып өтетін өзендер?", a: "Есіл, Нұра, Сарысу", w: ["Ертіс, Тобыл, Жайық", "Сырдария, Шу, Талас", "Іле, Қаратал, Аягөз"] },
            { q: "Сарыарқада орналасқан көлдер?", a: "Бурабай, Шортанды, Қорғалжын", w: ["Алакөл, Зайсан", "Марқакөл, Сілеті", "Арал, Каспий"] },
            { q: "Герцин тау жасалу кезінде пайда болған тау?", a: "Мұғалжар", w: ["Алтай", "Тянь-Шань", "Жетісу Алатауы"] },
            { q: "Мұғалжардың ең биік нүктесі?", a: "Үлкен Боқтыбай (657м)", w: ["Ақсораң", "Бесшоқы", "Қоянтау"] },
            { q: "Орал тауларының Қазақстандағы жалғасы?", a: "Мұғалжар тауы", w: ["Тарбағатай", "Сауыр", "Қаратау"] },
            { q: "Мұғалжар тауында кездесетін пайдалы қазбалар?", a: "Никель, кобальт, хромит, мыс", w: ["Алтын, күміс, платина", "Мұнай, газ, көмір", "Уран, фосфорит, бор"] },
            { q: "Адам баласының әрекетімен жасалған және археологияда табылған объект?", a: "Артефакт", w: ["Минерал", "Қазба", "Мутиль"] }
        ]
    }
];

// --- STATE VARIABLES ---
let currentDatabase = null;
let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let timeLeft = 60;
let timerInterval = null;

// --- DOM ELEMENTS ---
const appContainer = document.getElementById('app');

// --- HELPER FUNCTIONS ---
// Кездейсоқ араластыру (Fisher-Yates)
function shuffleArray(array) {
    let curId = array.length;
    while (0 !== curId) {
        let randId = Math.floor(Math.random() * curId);
        curId -= 1;
        let tmp = array[curId];
        array[curId] = array[randId];
        array[randId] = tmp;
    }
    return array;
}

// --- RENDER FUNCTIONS ---

// 1. Басты бетті көрсету (База таңдау)
function renderHome() {
    clearInterval(timerInterval);
    appContainer.innerHTML = `
        <div class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold mb-2">🌍 География ҰБТ Базасы</h1>
            <p class="text-blue-100">Тест тапсыру үшін төмендегі сабақтардың бірін таңдаңыз</p>
        </div>
        <div class="p-6 md:p-8 flex-1 bg-slate-50 flex flex-col justify-center">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-3xl mx-auto w-full">
                ${databases.map(db => `
                    <button onclick="startQuiz(${db.id})" class="btn-option text-left bg-white border-2 border-slate-200 p-4 rounded-xl shadow-sm flex items-center justify-between group">
                        <span class="font-semibold text-slate-700 group-hover:text-blue-600">${db.title}</span>
                        <span class="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-1 rounded-full">30 сұрақ</span>
                    </button>
                `).join('')}
            </div>
        </div>
    `;
}

// 2. Тестті бастау
window.startQuiz = function(dbId) {
    const db = databases.find(d => d.id === dbId);
    if (!db) return;
    
    currentDatabase = db;
    // Сұрақтардың көшірмесін алып, араластырамыз (бірақ бәрібір 30 сұрақ болады)
    currentQuestions = shuffleArray([...db.questions]);
    currentQuestionIndex = 0;
    score = 0;
    
    renderQuestion();
}

// 3. Сұрақты көрсету
function renderQuestion() {
    if (currentQuestionIndex >= currentQuestions.length) {
        return renderResults();
    }

    const qData = currentQuestions[currentQuestionIndex];
    
    // Жауаптарды дайындау
    const options = [
        { text: qData.a, isCorrect: true },
        { text: qData.w[0], isCorrect: false },
        { text: qData.w[1], isCorrect: false },
        { text: qData.w[2], isCorrect: false }
    ];
    shuffleArray(options);

    const progressPercent = ((currentQuestionIndex) / currentQuestions.length) * 100;

    appContainer.innerHTML = `
        <!-- Header -->
        <div class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center relative">
            <!-- Progress bar -->
            <div class="absolute bottom-0 left-0 h-1 bg-blue-500 transition-all duration-300" style="width: ${progressPercent}%"></div>
            
            <div class="text-sm font-semibold text-slate-500 truncate w-1/3" title="${currentDatabase.title}">
                ${currentDatabase.title}
            </div>
            <div class="font-bold text-slate-800 text-center w-1/3">
                Сұрақ ${currentQuestionIndex + 1} / ${currentQuestions.length}
            </div>
            <div class="text-right w-1/3 flex justify-end items-center text-rose-600 font-bold text-lg">
                ⏱️ <span id="timerDisplay" class="ml-1 w-12 text-center">01:00</span>
            </div>
        </div>
        
        <!-- Question -->
        <div class="p-6 md:p-8 flex-1 flex flex-col justify-center bg-slate-50">
            <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-8 text-center leading-snug">
                ${qData.q}
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-3xl mx-auto w-full" id="optionsContainer">
                ${options.map((opt, idx) => `
                    <button onclick="selectAnswer(${opt.isCorrect}, this)" data-correct="${opt.isCorrect}" 
                        class="btn-option text-lg text-left bg-white border-2 border-slate-200 p-4 md:p-5 rounded-xl shadow-sm text-slate-700 font-medium">
                        ${opt.text}
                    </button>
                `).join('')}
            </div>
        </div>
    `;

    startTimer();
}

// 4. Таймерді бастау
function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 60;
    updateTimerDisplay();
    
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            handleTimeOut();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const timerDisplay = document.getElementById('timerDisplay');
    if (timerDisplay) {
        const secs = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        timerDisplay.textContent = `00:${secs}`;
        if (timeLeft <= 10) {
            timerDisplay.classList.add('animate-pulse');
        } else {
            timerDisplay.classList.remove('animate-pulse');
        }
    }
}

// Уақыт біткендегі әрекет
function handleTimeOut() {
    const container = document.getElementById('optionsContainer');
    if(!container) return;
    
    const buttons = container.querySelectorAll('button');
    buttons.forEach(btn => {
        btn.classList.add('disabled');
        if (btn.getAttribute('data-correct') === 'true') {
            btn.classList.add('correct-answer');
        }
    });
    
    setTimeout(() => {
        currentQuestionIndex++;
        renderQuestion();
    }, 1500);
}

// 5. Жауапты таңдау
window.selectAnswer = function(isCorrect, btnElement) {
    clearInterval(timerInterval); // таймерді тоқтату
    
    const container = document.getElementById('optionsContainer');
    const buttons = container.querySelectorAll('button');
    
    // Барлық батырмаларды бұғаттау
    buttons.forEach(btn => btn.classList.add('disabled'));
    
    if (isCorrect) {
        btnElement.classList.add('correct-answer');
        score++;
    } else {
        btnElement.classList.add('wrong-answer');
        // Дұрыс жауапты жасылмен көрсету
        buttons.forEach(btn => {
            if (btn.getAttribute('data-correct') === 'true') {
                btn.classList.add('correct-answer');
            }
        });
    }
    
    // 1.5 секундтан кейін келесі сұраққа өту
    setTimeout(() => {
        currentQuestionIndex++;
        renderQuestion();
    }, 1500);
}

// 6. Нәтижелерді көрсету
function renderResults() {
    clearInterval(timerInterval);
    const percent = Math.round((score / currentQuestions.length) * 100);
    let message = "";
    if (percent >= 90) message = "Керемет нәтиже! 🎉";
    else if (percent >= 70) message = "Жақсы нәтиже! 👍";
    else if (percent >= 50) message = "Орташа нәтиже. Әлі де оқу керек! 📚";
    else message = "Төмен нәтиже. Материалды қайталап шығыңыз. 😔";

    appContainer.innerHTML = `
        <div class="bg-blue-600 text-white p-6 text-center">
            <h1 class="text-3xl font-bold">Сынақ аяқталды!</h1>
        </div>
        <div class="p-8 flex-1 flex flex-col items-center justify-center bg-slate-50 text-center">
            <div class="w-32 h-32 rounded-full border-8 ${percent >= 70 ? 'border-green-500' : 'border-blue-500'} flex items-center justify-center mb-6">
                <span class="text-4xl font-bold text-slate-800">${score}/${currentQuestions.length}</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">${percent}% көрсеткіш</h2>
            <p class="text-lg text-slate-600 mb-8">${message}</p>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                <button onclick="startQuiz(${currentDatabase.id})" class="flex-1 bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold py-3 px-6 rounded-xl transition-colors">
                    🔄 Қайтадан бастау
                </button>
                <button onclick="renderHome()" class="flex-1 bg-blue-600 text-white hover:bg-blue-700 font-bold py-3 px-6 rounded-xl transition-colors shadow-md hover:shadow-lg">
                    🏠 Басқа база таңдау
                </button>
            </div>
        </div>
    `;
}

// --- ІСКЕ ҚОСУ ---
renderHome();

</script>
</body>
</html>
